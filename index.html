<!doctype html>
<html lang="en">
  <head>
    <script>
      try {
        var isDark = localStorage.getItem("pf_theme") === "dark";
        if (isDark) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        var link = document.createElement("link");
        link.rel = "preload";
        link.as = "image";
        link.href = isDark ? "/landing-dark.jpeg" : "/landing-light.jpeg";
        document.head.appendChild(link);
      } catch (e) {}
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preconnect to font and CDN origins to reduce latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <!-- Preload font stylesheet so Inter/Fira load earlier -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap"
      as="style"
    />
    <!-- display=swap: show fallback first, then swap when font loads (avoids font-display timeout console warnings) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet" /></noscript>
    <!-- Non-render-blocking: Font Awesome loaded async (6.6.0; glyph bbox console warnings are a known FA webfont quirk, safe to ignore) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
      media="print"
      onload="this.media='all'"
    />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" /></noscript>
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://eurodata.app/" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="__VITE_APP_DESCRIPTION__" />
    <title>__VITE_APP_NAME__</title>
  </head>
  <body class="bg-white text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
